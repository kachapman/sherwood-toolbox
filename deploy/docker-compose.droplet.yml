# This is a ready-to-use docker-compose.yml for the droplet.
# It removes the obsolete "version" key and includes safe defaults for the 1 GB droplet.

services:
  sherwood-toolbox:
    build: .
    container_name: sherwood-toolbox
    restart: unless-stopped
    environment:
      - TOOLBOX_WEB_MODE=1
      - TOOLBOX_HOST=0.0.0.0
      - TOOLBOX_PORT=8777
      - TOOLBOX_DATA_DIR=/data
      - TOOLBOX_UPLOAD_DIR=/data/uploads
      - ENHANCER_FORK_TIMEOUT=120
      - WEB_ENHANCER_MAX_PHOTO_PAGES=20
    ports:
      - "8777:8777"
    volumes:
      - /opt/sherwood-toolbox/data:/data
      # CRM (Option A - commented). Enter via Admin UI after bootstrap.
      # - /root/.config/photo_report_generator:/home/toolbox/.config/photo_report_generator:ro
    networks:
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8777/', timeout=3) or sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  web:
    external: true
