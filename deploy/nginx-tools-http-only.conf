# Temporary HTTP-only config for tools.sherwoodestimates.com
# Use this until certbot has created the certificate.
# After certbot succeeds, replace with the full SSL version (or let certbot manage it).

server {
    listen 80;
    server_name tools.sherwoodestimates.com;

    location / {
        proxy_pass http://127.0.0.1:8777;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }
}
