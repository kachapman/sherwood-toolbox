services:
  sherwood-toolbox:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sherwood-toolbox
    restart: unless-stopped
    environment:
      - TOOLBOX_WEB_MODE=1
      - TOOLBOX_HOST=0.0.0.0
      - TOOLBOX_PORT=8777
      - TOOLBOX_DATA_DIR=/data
      - TOOLBOX_UPLOAD_DIR=/data/uploads
      # - TOOLBOX_CRM_BASE_URL=https://office.publicadjustermidwest.com
    ports:
      # Publish when the reverse proxy is on the host (common after old stack shutdown).
      # Remove this line if you only proxy via Docker network (sherwood-toolbox:8777).
      - "8777:8777"
    volumes:
      - toolbox-data:/data
      # Share CRM creds (optional). Use the correct container home (Dockerfile uses uid 1000 "toolbox").
      # - /root/.config/photo_report_generator:/home/toolbox/.config/photo_report_generator:ro
    networks:
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8777/', timeout=3) or sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  toolbox-data:

networks:
  web:
    external: true
