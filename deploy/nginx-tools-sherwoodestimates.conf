server {
    listen 80;
    server_name tools.sherwoodestimates.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tools.sherwoodestimates.com;

    ssl_certificate     /etc/letsencrypt/live/tools.sherwoodestimates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tools.sherwoodestimates.com/privkey.pem;

    # === FIX FOR 413 "Content Too Large" ===
    # The previous config (or nginx default) had a tiny client_max_body_size (often 1m).
    # Photo Report uploads many images in one POST.
    # Estimate Enhancer uploads PDFs.
    # This must be >= the largest upload you allow.
    # 60m matches the app's built-in MAX_CONTENT_LENGTH.
    # Raise to 100m or more if you need bigger files.
    client_max_body_size 100m;  # raised to prevent 413 on Photo Report (many images) and Enhancer (PDFs)

    location / {
        proxy_pass http://127.0.0.1:8777;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for large uploads + auth cookies
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }
}
